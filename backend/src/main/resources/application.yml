server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cryptopal-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cryptopal}
    username: ${SPRING_DATASOURCE_USERNAME:cryptopal}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

data-provider:
  profile: ${DATA_PROVIDER_PROFILE:ticker}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:20}

resilience4j:
  circuitbreaker:
    instances:
      gemini:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      gemini:
        maxAttempts: 2
        waitDuration: 1s
